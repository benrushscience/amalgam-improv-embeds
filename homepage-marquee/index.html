<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Amalgam Improv Homepage Marquee</title>
  <style>
    :root {
      font-family: Arial, Helvetica, sans-serif;
      color: #171717;
      background: transparent;
    }

    * { box-sizing: border-box; }

    body { margin: 0; }

    .marquee {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 8px;
    }

    .card {
      position: relative;
      display: block;
      min-height: 320px;
      overflow: hidden;
      border: 2px solid #bd005b;
      border-radius: 2px;
      background: #1c1720;
      color: #fff;
      text-decoration: none;
      isolation: isolate;
      box-shadow: 0 0 0 3px #ffe974, 0 0 13px rgb(189 0 91 / 0.9), 0 0 28px rgb(189 0 91 / 0.56);
      animation: neon-breath 4.5s ease-in-out infinite;
    }

    .card:nth-child(2) {
      border-color: #ffe974;
      box-shadow: 0 0 0 3px #bd005b, 0 0 13px rgb(255 233 116 / 0.9), 0 0 28px rgb(255 233 116 / 0.56);
      animation-name: neon-breath-yellow;
      animation-delay: -1.5s;
    }

    .card:nth-child(3) { animation-delay: -3s; }

    .card::after {
      position: absolute;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, rgb(189 0 91 / 0.14), transparent 35%, rgb(0 0 0 / 0.86)), linear-gradient(135deg, transparent 60%, rgb(255 233 116 / 0.16));
      content: "";
    }

    .card img {
      position: absolute;
      inset: 0;
      z-index: -2;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 280ms ease, filter 280ms ease;
    }

    .card:hover img,
    .card:focus-visible img { filter: saturate(1.15); transform: scale(1.06); }

    .card:hover { transform: translateY(-4px); }

    .card:focus-visible { outline: 3px solid #ffe974; outline-offset: 5px; }

    .card-copy {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      padding: 15px 18px 16px;
      background: linear-gradient(90deg, rgb(28 23 32 / 0.94), rgb(28 23 32 / 0.58));
      border-top: 2px solid #ffe974;
    }

    .eyebrow {
      display: block;
      margin-bottom: 6px;
      color: #ffe974;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .title {
      display: block;
      font-size: clamp(1.1rem, 1.8vw, 1.45rem);
      font-weight: 700;
      line-height: 1.15;
    }

    @keyframes neon-breath {
      50% { box-shadow: 0 0 0 3px #ffe974, 0 0 19px rgb(189 0 91 / 1), 0 0 36px rgb(189 0 91 / 0.72); }
    }

    @keyframes neon-breath-yellow {
      50% { box-shadow: 0 0 0 3px #bd005b, 0 0 19px rgb(255 233 116 / 1), 0 0 36px rgb(255 233 116 / 0.72); }
    }

    @media (max-width: 700px) {
      .marquee {
        display: flex;
        gap: 20px;
        overflow-x: auto;
        padding: 8px 8px 14px;
        scroll-snap-type: x mandatory;
        scrollbar-width: thin;
      }

      .card {
        flex: 0 0 min(82vw, 350px);
        min-height: 340px;
        scroll-snap-align: start;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .card,
      .card img { animation: none; transition: none; }
    }
  </style>
</head>
<body>
  <section class="marquee" id="marquee" aria-label="Featured Amalgam Improv links"></section>

  <script>
    // Homepage marquee content. To add or replace a card, copy an object below.
    // GitHub Pages image paths are relative to this file, for example:
    // image: "./assets/my-new-photo.jpg"
    const cards = [
      {
        title: "Big Honey's Little Improv Festival",
        eyebrow: "Festival",
        href: "https://www.amalgamimprov.com/big-honey-events",
        image: "https://images.squarespace-cdn.com/content/v1/66ca092dcc6bcf37713df36d/1a7bab22-34b2-4c2a-9b30-16011c9460e0/whimsy+slideshow+image+%282%29.jpg?format=500w",
        alt: "Big Honey's Little Improv Festival"
      },
      {
        title: "Open Jam — July 30",
        eyebrow: "All skill levels",
        href: "https://www.amalgamimprov.com/shop/p/open-jam-2026-07-30",
        image: "https://images.squarespace-cdn.com/content/v1/66ca092dcc6bcf37713df36d/e0542139-29c1-4f73-9314-f18b77f756df/Open+Jam+July+Square+2026-07-30.png?format=750w",
        alt: "Open Jam on July 30, 2026"
      },
      {
        title: "Level 0 Course — August 1",
        eyebrow: "Four-hour introduction",
        href: "https://www.amalgamimprov.com/shop/p/level-0-course-2026-08-01",
        image: "./assets/Level 0 Course Square 2026-08-01.png",
        alt: "Level 0 Course on August 1, 2026"
      }
    ];

    // Render content from the small editable list above, avoiding repeated HTML markup.
    document.querySelector("#marquee").innerHTML = cards.map((card) => `
      <!-- _top ensures that a card changes the Squarespace page, not only this iframe. -->
      <a class="card" href="${card.href}" target="_top">
        <img src="${card.image}" alt="${card.alt}" loading="lazy">
        <span class="card-copy">
          <span class="eyebrow">${card.eyebrow}</span>
          <span class="title">${card.title}</span>
        </span>
      </a>
    `).join("");
  </script>
</body>
</html>
