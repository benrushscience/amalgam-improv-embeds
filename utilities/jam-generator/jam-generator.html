<!-- Jam Generator for Squarespace: configurable warm-up, drill, and game counts -->
<div id="amalgam-jam-generator" class="ajg">
  <div class="ajg-header">
    <div class="ajg-title">Jam Generator</div>
    <div id="ajg-subtitle" class="ajg-subtitle">3 warm-ups &bull; 1 drill &bull; 5 games</div>
  </div>

  <div class="ajg-counts" aria-label="Jam size controls">
    <div class="ajg-counter">
      <span class="ajg-counter-label">Warm-ups</span>
      <button class="ajg-counter-btn" type="button" data-count-key="warmUps" data-count-step="-1" aria-label="Decrease warm-ups">-</button>
      <span id="ajg-count-warmups" class="ajg-counter-value" aria-live="polite">3</span>
      <button class="ajg-counter-btn" type="button" data-count-key="warmUps" data-count-step="1" aria-label="Increase warm-ups">+</button>
    </div>
    <div class="ajg-counter">
      <span class="ajg-counter-label">Drills</span>
      <button class="ajg-counter-btn" type="button" data-count-key="drills" data-count-step="-1" aria-label="Decrease drills">-</button>
      <span id="ajg-count-drills" class="ajg-counter-value" aria-live="polite">1</span>
      <button class="ajg-counter-btn" type="button" data-count-key="drills" data-count-step="1" aria-label="Increase drills">+</button>
    </div>
    <div class="ajg-counter">
      <span class="ajg-counter-label">Games</span>
      <button class="ajg-counter-btn" type="button" data-count-key="games" data-count-step="-1" aria-label="Decrease games">-</button>
      <span id="ajg-count-games" class="ajg-counter-value" aria-live="polite">5</span>
      <button class="ajg-counter-btn" type="button" data-count-key="games" data-count-step="1" aria-label="Increase games">+</button>
    </div>
  </div>

  <div class="ajg-controls">
    <button id="ajg-generate" class="ajg-btn">Generate Jam</button>
    <button id="ajg-copy" class="ajg-btn ajg-btn-secondary" type="button">Copy to Clipboard</button>
  </div>

  <div id="ajg-meta" class="ajg-meta" aria-live="polite"></div>

  <div class="ajg-table-wrap">
    <table class="ajg-table" id="ajg-table" aria-label="Generated jam activities">
      <thead>
        <tr>
          <th style="width: 18%">Slot</th>
          <th style="width: 18%">Game name</th>
          <th style="width: 18%">Type</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody id="ajg-tbody">
        <tr>
          <td colspan="4" class="ajg-empty">Click <strong>Generate Jam</strong> to get a random set of activities.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="ajg-footer">
    <span class="ajg-note">Note: Selection is random without replacement within each slot.</span>
  </div>
</div>

      { name: "Elephant", type: "Warm-up / game", description: "Teach three-person shapes such as elephant, palm tree, or toaster. A center caller points and names a shape for the target and neighbors to make.", difficulty: 2 },
      { name: "Emotional Mirror", type: "Warm-up / drill", description: "Pair players face to face. One shows an emotion through face, breath, and body; the other mirrors it, then they switch.", difficulty: 2 },
      { name: "Energy 1â€“10", type: "Warm-up / drill", description: "Have players move around the room while you call energy levels from 1 to 10. They adjust size, speed, and voice safely.", difficulty: 2 },
      { name: "Exaggeration Circle", type: "Warm-up", description: "One player makes a small gesture or sound. Each next player repeats it slightly bigger until it grows around the circle.", difficulty: 2 },
      { name: "Family Portraits", type: "Exercise", description: "Call out a family type, event, or location. Small groups quickly freeze into portraits with clear relationships and physical levels.", difficulty: 2 },
      { name: "Flock Dance", type: "Warm-up", description: "Group players in a diamond. The person facing front leads slow movement, and leadership changes whenever the group turns.", difficulty: 2 },
      { name: "Follow the Leader", type: "Warm-up", description: "One player leads movement, walk, or behavior while the group copies. Rotate leaders and encourage clear, repeatable choices.", difficulty: 1 },
      { name: "Free Association Lines", type: "Warm-up", description: "Give a prompt and have players quickly form a line or cluster based on their association, then call a new prompt and reshuffle.", difficulty: 2 },
      { name: "Fruit Basket", type: "Warm-up / game", description: "Give seated players categories or fruit names. A center caller names a category, and matching players switch seats while the caller tries to sit.", difficulty: 2 },
      { name: "Fuzzy Ducky", type: "Warm-up", description: "Teach the tongue-twister phrase and direction rules. Pass it around the circle, reversing direction on the agreed cue.", difficulty: 2 },
      { name: "Greetings", type: "Warm-up", description: "Have players walk around and greet each other. Call different relationships, emotions, or contexts for each new greeting.", difficulty: 2 },
      { name: "Group Order", type: "Warm-up / exercise", description: "Ask the group to arrange themselves by a rule such as birthday, distance traveled, or shoe size, with or without talking.", difficulty: 2 },
      { name: "Ha Soh Kah", type: "Warm-up", description: "Teach the three-part sound and gesture pattern. Players pass focus around the circle using the correct cue and rhythm.", difficulty: 2 },
      { name: "Hot Spot", type: "Warm-up", description: "Put one player in the center to sing, speak, or move briefly. Other players support and replace them by stepping in quickly.", difficulty: 3 },
      { name: "House, Creature, Flood", type: "Warm-up / game", description: "Call one of three prompts. Players quickly form the required group shape, such as a house, creature, or flood, before the next call.", difficulty: 2 },
      { name: "Jump", type: "Warm-up", description: "Stand in a circle and pass a jump cue with eye contact. The receiver jumps and immediately sends the cue to someone else.", difficulty: 2 },
      { name: "Last Letter", type: "Warm-up", description: "Choose a category or open association. Each new word must begin with the final letter of the previous player's word.", difficulty: 2 },
      { name: "Letter Number Name", type: "Warm-up", description: "Create a repeating pattern using a letter, a number, and a name. Players pass the pattern around while preserving the order.", difficulty: 3 },
      { name: "Malapropism", type: "Drill / game", description: "Run a scene where players intentionally use an incorrect word, then immediately justify it as meaningful in the scene.", difficulty: 3 },
      { name: "Mexican Name Wave", type: "Warm-up", description: "Have one player say their name with a gesture, then the group passes that name and gesture around the circle like a wave.", difficulty: 1 },
      { name: "Commercial", type: "Game", description: "Get an imaginary product or problem from the audience. Players improvise a short commercial with a pitch, demonstration, and tagline.", difficulty: 3 },
      { name: "Consciences", type: "Game / scene format", description: "Start a scene with one main character. Assign two offstage voices to advise them with competing impulses during the scene.", difficulty: 4 },
      { name: "Countdown", type: "Game / drill", description: "Give players a scene or task and a visible countdown. Call remaining time so they make faster, clearer choices before time expires.", difficulty: 3 },
      { name: "Cut", type: "Game / drill", description: "Run a scene where the facilitator or players can call Cut to jump to a new time, angle, or location while preserving continuity.", difficulty: 4 },
      { name: "Dada Monologue", type: "Game / exercise", description: "Give one player a word or image. They deliver a short abstract monologue using free association, sound, and committed physicality.", difficulty: 3 },
      { name: "Dating Game", type: "Game", description: "Send one contestant away while assigning each date a character or quirk. The contestant returns, asks questions, and guesses the dates.", difficulty: 4 },
      { name: "Dubbed Movie", type: "Game", description: "Two actors play a silent or gibberish scene while two offstage players provide their dialogue, matching movement and timing.", difficulty: 4 },
      { name: "Fast Forward", type: "Game / drill", description: "Start a scene, then call Fast Forward to jump ahead in time. Players show what changed while keeping the story connected.", difficulty: 4 },
      { name: "First Line Last Line", type: "Game / scene format", description: "Get a first line and a final line. Players start with the first line and justify the scene so it can end on the final line.", difficulty: 4 },
      { name: "Five Four Three Two One", type: "Warm-up / drill", description: "Give a simple prompt and have players make five quick offers, then four, three, two, and one with shrinking thinking time.", difficulty: 2 },
      { name: "Funeral Service", type: "Game", description: "Choose a fictional person, object, or idea to memorialize. Players step up as different speakers giving brief tributes.", difficulty: 3 },
      { name: "Gibberish Expert", type: "Game / exercise", description: "One player is an expert who speaks only gibberish. A translator stands beside them and turns each answer into English.", difficulty: 3 },
      { name: "Give and Take", type: "Exercise", description: "Pair players for a scene focused on sharing focus, space, and offers. Coach them to notice when to lead and when to yield.", difficulty: 3 },
      { name: "Character Swap", type: "Game / drill", description: "Start a scene with clear characters. Call Swap, and players exchange characters, traits, or points of view while continuing the scene.", difficulty: 4 },
    ];

    const MAX_COUNT = 12;
    const selectedCounts = {
      warmUps: 3,
      drills: 1,
      games: 5
    };


    // --- Categorization rules ---
    function normalizeType(typeText) {
      return String(typeText || "").toLowerCase();
    }

    function isWarmUp(activity) {
      return normalizeType(activity.type).includes("warm-up");
    }

    function isDrill(activity) {
      const typeText = normalizeType(activity.type);
      // Drill bucket: explicitly drill/exercise/scene format, excluding anything already counted as warm-up
      const drillish = typeText.includes("drill") || typeText.includes("exercise") || typeText.includes("scene format");
      return drillish && !isWarmUp(activity);
    }

    function isGame(activity) {
      const typeText = normalizeType(activity.type);
      // Game bucket: has "game" and not a warm-up; (some items are game/drillâ€”fine)
      return typeText.includes("game") && !isWarmUp(activity);
    }

    function shuffleInPlace(array) {
      for (let index = array.length - 1; index > 0; index--) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [array[index], array[swapIndex]] = [array[swapIndex], array[index]];
      }
      return array;
    }

    function sampleWithoutReplacement(poolArray, sampleCount) {
      const poolCopy = poolArray.slice();
      shuffleInPlace(poolCopy);
      return poolCopy.slice(0, Math.min(sampleCount, poolCopy.length));
    }

    function uniqueByName(items) {
      const seen = new Set();
      const output = [];
      for (const item of items) {
        const key = item.name.trim().toLowerCase();
        if (!seen.has(key)) {
          seen.add(key);
          output.push(item);
        }
      }
      return output;
    }

    function generateJam(counts) {
      const warmUpsPool = ACTIVITIES.filter(isWarmUp);
      const drillsPool = ACTIVITIES.filter(isDrill);
      const gamesPool = ACTIVITIES.filter(isGame);

      const warmUpsPicked = sampleWithoutReplacement(warmUpsPool, counts.warmUps);

      let usedNames = new Set(warmUpsPicked.map(a => a.name.toLowerCase()));

      let drillPicked = sampleWithoutReplacement(
        drillsPool.filter(a => !usedNames.has(a.name.toLowerCase())),
        counts.drills
      );
      usedNames = new Set([...usedNames, ...drillPicked.map(a => a.name.toLowerCase())]);

      if (drillPicked.length < counts.drills) {
        const fallbackDrills = ACTIVITIES.filter(a => {
          const typeText = normalizeType(a.type);
          return !isWarmUp(a) && !usedNames.has(a.name.toLowerCase()) && (typeText.includes("drill") || typeText.includes("exercise") || typeText.includes("scene format"));
        });
        const fallbackPicked = sampleWithoutReplacement(fallbackDrills, counts.drills - drillPicked.length);
        drillPicked = [...drillPicked, ...fallbackPicked];
        usedNames = new Set([...usedNames, ...fallbackPicked.map(a => a.name.toLowerCase())]);
      }

      const gamesFiltered = gamesPool.filter(a => !usedNames.has(a.name.toLowerCase()));
      const gamesPicked = sampleWithoutReplacement(gamesFiltered, counts.games);

      const finalWarmUps = uniqueByName(warmUpsPicked).slice(0, counts.warmUps);
      const finalDrills = uniqueByName(drillPicked).slice(0, counts.drills);
      const finalGames = uniqueByName(gamesPicked).slice(0, counts.games);

      return { warmUps: finalWarmUps, drills: finalDrills, games: finalGames, requested: counts };
    }

    function renderJam(jam) {
      const tbody = document.getElementById("ajg-tbody");
      const meta = document.getElementById("ajg-meta");

      const rows = [];

      jam.warmUps.forEach((a, idx) => {
        rows.push({ slot: `Warm-up ${idx + 1}`, slotClass: "ajg-slot ajg-slot-warmup", activity: a });
      });

      jam.drills.forEach((a, idx) => {
        rows.push({ slot: `Drill ${idx + 1}`, slotClass: "ajg-slot ajg-slot-drill", activity: a });
      });

      const missingDrills = Math.max(0, jam.requested.drills - jam.drills.length);
      for (let index = 0; index < missingDrills; index++) {
        rows.push({ slot: `Drill ${jam.drills.length + index + 1}`, slotClass: "ajg-slot ajg-slot-drill", activity: { name: "--", type: "--", description: "No drill found with current filters.", difficulty: "--" } });
      }

      jam.games.forEach((a, idx) => {
        rows.push({ slot: `Game ${idx + 1}`, slotClass: "ajg-slot ajg-slot-game", activity: a });
      });

      tbody.innerHTML = rows.map(r => {
        return `
          <tr>
            <td class="${r.slotClass}">
              <span class="ajg-pill">${r.slot}</span>
            </td>
            <td><strong>${escapeHtml(r.activity.name)}</strong></td>
            <td>${escapeHtml(r.activity.type)}</td>
            <td>${escapeHtml(r.activity.description)}</td>
          </tr>
        `;
      }).join("");

      const now = new Date();
      meta.textContent = `Generated: ${now.toLocaleString()}`;

      // Store last jam for copy
      window.__AJG_LAST_JAM__ = rows;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function copyToClipboard() {
      const rows = window.__AJG_LAST_JAM__;
      if (!rows || !rows.length) return;

      const lines = rows.map(r => {
        const a = r.activity;
        return `${r.slot}\t${a.name}\t${a.type}\t${a.description}`;
      });

      const header = "Slot\tGame name\tType\tDescription";
      const text = [header, ...lines].join("\n");

      try {
        await navigator.clipboard.writeText(text);
        const meta = document.getElementById("ajg-meta");
        meta.textContent = "Copied to clipboard âœ…";
      } catch (error) {
        const meta = document.getElementById("ajg-meta");
        meta.textContent = "Copy failed (browser blocked clipboard). You can manually select the table instead.";
      }
    }

    function clampCount(value) {
      return Math.max(0, Math.min(MAX_COUNT, value));
    }

    function updateSubtitle() {
      const subtitle = document.getElementById("ajg-subtitle");
      subtitle.textContent = `${selectedCounts.warmUps} warm-ups | ${selectedCounts.drills} drills | ${selectedCounts.games} games`;
    }

    function renderCounters() {
      document.getElementById("ajg-count-warmups").textContent = String(selectedCounts.warmUps);
      document.getElementById("ajg-count-drills").textContent = String(selectedCounts.drills);
      document.getElementById("ajg-count-games").textContent = String(selectedCounts.games);
      updateSubtitle();
    }

    function wireUp() {
      const generateButton = document.getElementById("ajg-generate");
      const copyButton = document.getElementById("ajg-copy");
      const counterButtons = document.querySelectorAll("[data-count-key][data-count-step]");

      counterButtons.forEach(button => {
        button.addEventListener("click", () => {
          const key = button.getAttribute("data-count-key");
          const step = Number(button.getAttribute("data-count-step") || "0");
          if (!Object.prototype.hasOwnProperty.call(selectedCounts, key)) return;
          selectedCounts[key] = clampCount(selectedCounts[key] + step);
          renderCounters();
        });
      });

      generateButton.addEventListener("click", () => {
        const jam = generateJam(selectedCounts);
        renderJam(jam);
      });

      copyButton.addEventListener("click", () => {
        copyToClipboard();
      });

      renderCounters();
    }

    wireUp();
  })();
</script>
