<!-- Ultra-safe Random Word Generator (minimal UI, Squarespace-resistant) -->
<div id="amalgam-word-widget" tabindex="0">
  <style>
    #amalgam-word-widget{
      --bg-offwhite:#F7F6F3;
      --bg-yellow:#FFE974;
      --bg-orange:#E55937;
      --bg-pink:#BD005B;
      --ink:#000000;
    }

    /* HARD RESET scoped to widget */
    #amalgam-word-widget,
    #amalgam-word-widget *{
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      text-decoration: none !important;
      background-image: none !important;
      filter: none !important;
    }

    #amalgam-word-widget{
      max-width: 720px;
      margin: 0 auto;
      padding: 18px;
      background: var(--bg-offwhite);
      border: 2px solid var(--ink);
      border-radius: 18px;
      box-shadow: 8px 8px 0 var(--ink);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
    }

    #amalgam-word-widget .word-card{
      background: var(--bg-yellow);
      border: 2px solid var(--ink);
      border-radius: 14px;
      padding: 28px 20px;
      text-align: center;
      margin-bottom: 18px;
    }

    #amalgam-word-widget .word{
      font-size: clamp(36px, 6vw, 60px);
      font-weight: 900;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      line-height: 1.05;
    }

    #amalgam-word-widget .controls{
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #amalgam-word-widget .category-lanes{
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 14px;
    }

    #amalgam-word-widget .lane-btn{
      appearance: none;
      border: 2px solid var(--ink);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      background: #ffffff;
      color: var(--ink);
    }

    #amalgam-word-widget .lane-btn.active{
      background: var(--bg-orange);
      color: var(--bg-offwhite);
    }

    #amalgam-word-widget button{
      appearance: none;
      border: 2px solid var(--ink);
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--ink);
      background: var(--bg-offwhite);
      color: var(--ink);
    }

    #amalgam-word-widget button.primary{
      background: var(--bg-pink);
      color: var(--bg-offwhite);
      font-size: 16px;
    }

    #amalgam-word-widget button:active{
      transform: translate(2px,2px);
      box-shadow: 2px 2px 0 var(--ink);
    }

    #amalgam-word-widget button[disabled]{
      opacity: 0.4;
      cursor: not-allowed;
    }
  </style>

  <div class="word-card">
    <div class="word" id="current-word">Click for a word</div>
  </div>

  <div class="category-lanes" role="group" aria-label="Word categories">
    <button class="lane-btn active" data-category="all" type="button">All</button>
    <button class="lane-btn" data-category="object" type="button">Object</button>
    <button class="lane-btn" data-category="emotion" type="button">Emotion</button>
    <button class="lane-btn" data-category="location" type="button">Location</button>
    <button class="lane-btn" data-category="relationship" type="button">Relationship</button>
    <button class="lane-btn" data-category="wildcard" type="button">Wildcard</button>
  </div>

  <div class="controls">
    <button class="primary" id="new-word">New Word</button>
    <button id="copy-word">Copy</button>
    <button id="undo-word" disabled>Undo</button>
  </div>
</div>

    const currentWordEl = widgetEl ? widgetEl.querySelector("#current-word") : null;
    const newWordBtn = widgetEl ? widgetEl.querySelector("#new-word") : null;
    const copyBtn = widgetEl ? widgetEl.querySelector("#copy-word") : null;
    const undoBtn = widgetEl ? widgetEl.querySelector("#undo-word") : null;
    const laneBtns = widgetEl ? Array.from(widgetEl.querySelectorAll(".lane-btn")) : [];

    if (!widgetEl || !currentWordEl || !newWordBtn || !copyBtn || !undoBtn || laneBtns.length === 0) return;

    let deck = [];
    let lastWord = null;
    let activeCategory = "all";

    function shuffle(array){
      return array
        .map(value => ({ value, sort: Math.random() }))
        .sort((a,b) => a.sort - b.sort)
        .map(({ value }) => value);
    }

    function drawWord(){
      const activePool = words
        .filter((item) => activeCategory === "all" || item.category === activeCategory)
        .map((item) => item.text);

      if (activePool.length === 0){
        currentWordEl.textContent = "No words in this lane";
        undoBtn.disabled = true;
        return;
      }

      if (deck.length === 0){
        deck = shuffle(activePool);
      }
      lastWord = currentWordEl.textContent;
      currentWordEl.textContent = deck.pop();
      undoBtn.disabled = false;
    }

    function undo(){
      if (!lastWord) return;
      deck.push(currentWordEl.textContent);
      currentWordEl.textContent = lastWord;
      lastWord = null;
      undoBtn.disabled = true;
    }

    async function copyWord(){
      const text = currentWordEl.textContent;
      if (!text || text === "Click for a word") return;
      try{
        await navigator.clipboard.writeText(text);
      } catch(e){}
    }

    newWordBtn.addEventListener("click", drawWord);
    undoBtn.addEventListener("click", undo);
    copyBtn.addEventListener("click", copyWord);
    laneBtns.forEach((btn) => {
      btn.addEventListener("click", () => {
        activeCategory = btn.dataset.category || "all";
        laneBtns.forEach((candidate) => candidate.classList.remove("active"));
        btn.classList.add("active");
        deck = [];
        lastWord = null;
        undoBtn.disabled = true;
        currentWordEl.textContent = "Click for a word";
      });
    });

    widgetEl.addEventListener("keydown", (e) => {
      if (e.key === "n" || e.key === "N") drawWord();
      if (e.key === "u" || e.key === "U") undo();
      if (e.key === "c" || e.key === "C") copyWord();
    });
  })();
